services:
  # ========================
  # APPLICATION SERVICE
  # ========================
  fastapi-app:
    build: .
    container_name: fastapi-app
    environment:
      LOG_SERIALIZED: true
      LOG_LEVEL: INFO
      LOG_TO_FILE: false
      OTEL_SERVICE_NAME: fastapi-app
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_METRIC_EXPORT_INTERVAL: 5000
      OTEL_ENABLED: true
    ports:
      - "8000:8000"
    depends_on:
      - loki
      - tempo
      - prometheus
    networks:
      - observability

  # ========================
  # OBSERVABILITY STACK (LGTM)
  # ========================

  # Loki: Log aggregation system (Logs)
  # Receives logs from OTel Collector (OTLP) and stores them for querying
  loki:
    image: grafana/loki:3.6.7
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/tmp/loki
    command:
      - "-config.file=/etc/loki/config.yml"
    networks:
      - observability

  # Tempo: Distributed tracing backend (Traces)
  # Receives traces from OpenTelemetry Collector and stores them for querying
  tempo:
    image: grafana/tempo:2.10.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./docker/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"
    networks:
      - observability

  # Prometheus: Metrics collection and monitoring (Metrics)
  # Scrapes metrics from OpenTelemetry Collector and provides a UI for querying
  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus-config.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--enable-feature=exemplar-storage" # Enable exemplar storage for better trace-metric correlation
    networks:
      - observability

  # OpenTelemetry Collector: Unified telemetry data collection and export (Traces + Metrics)
  # Receives traces and metrics from the app, processes them, and exports to Tempo and Prometheus
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.146.1
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./docker/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - tempo
      - prometheus
    networks:
      - observability

  # Grafana: Visualization and dashboarding
  # Connects to Prometheus, Loki, and Tempo for visualizing metrics, logs, and traces
  # Access at http://localhost:3000 (admin/admin)
  grafana:
    image: grafana/grafana:12.3.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - prometheus
      - tempo
    networks:
      - observability

# Persistent volumes for data storage
volumes:
  grafana-data: # Grafana dashboards, datasources, and settings
  loki-data: # Loki log indexes and chunks
  tempo-data: # Tempo trace data
  prometheus_data: # Prometheus time series data

# Network for observability stack
networks:
  observability:
    driver: bridge
