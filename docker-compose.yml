services:
  fastapi-app:
    build: .
    container_name: fastapi-app
    environment:
      LOG_FORMAT: json
      LOG_LEVEL: INFO
      LOG_TO_FILE: false
      OTEL_SERVICE_NAME: fastapi-app
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "otel-collector:4317"
      OTEL_SDK_DISABLED: false
      OTEL_TRACES_SAMPLER: traceidratio
      OTEL_TRACES_SAMPLER_ARG: 1.0 # value between 0.0 (no traces) and 1.0 (all traces)
    ports:
      - "8000:8000"
    networks:
      - observability

  # ========================
  # OBSERVABILITY STACK (LGTM)
  # ========================

  # Loki: Log aggregation system (Logs)
  # Receives logs from Promtail and stores them for querying
  loki:
    image: grafana/loki:3.6.7
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/tmp/loki
    command:
      - "-config.file=/etc/loki/config.yml"
    networks:
      - observability

  # Grafana: Observability dashboard and visualization (UI)
  # Provides unified interface for logs, metrics, and traces
  # Access at http://localhost:3000 (admin/admin)
  grafana:
    image: grafana/grafana:12.3.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    networks:
      - observability

  # Promtail: Log shipping agent
  # Collects logs from Docker containers and forwards to Loki
  promtail:
    image: grafana/promtail:3.6.7
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/promtail-config.yml:/etc/promtail/config.yml:ro
      # Promtail lit les logs Docker (stdout des containers)
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    depends_on:
      - loki
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.10.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./docker/tempo-config.yml:/etc/tempo/config.yml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200" # tempo query
      # - "4317:4317" # OTLP gRPC (optional if you send directly)
    depends_on:
      - grafana
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector:0.146.1
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yml"]
    volumes:
      - ./docker/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    ports:
      - "4317:4317" # OTLP gRPC from app
      - "4318:4318" # OTLP HTTP (optional)
    depends_on:
      - tempo
    networks:
      - observability

# Persistent volumes for data storage
volumes:
  grafana-data: # Grafana dashboards, datasources, and settings
  loki-data: # Loki log indexes and chunks
  promtail-positions: # Promtail positions data
  tempo-data: # Tempo trace data

# Network for observability stack
networks:
  observability:
    driver: bridge
