server:
  http_listen_port: 9080
  grpc_listen_port: 0 # Disable gRPC

positions:
  filename: /tmp/positions.yaml # Promtail keeps track of log file positions to avoid reprocessing

clients:
  - url: http://loki:3100/loki/api/v1/push

# Scrape configs - define how to collect logs
scrape_configs:
  - job_name: docker-containers # Collect logs from all Docker containers

    # Docker service discovery - automatically find containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock # Connect to Docker daemon
        refresh_interval: 5s # Check for new containers every 5 seconds

    relabel_configs:
      # Add Docker Compose service name (e.g., "fastapi-app", "loki", "grafana")
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        target_label: service_name

    # Pipeline stages - process and parse log lines
    pipeline_stages:
      # Match only logs from our application container (service_name="fastapi-app") for structured parsing
      - match:
          selector: '{service_name="fastapi-app"}'
          stages:
            # First parse to check if "record" field exists
            - json:
                expressions:
                  record: record

            # Drop logs that don't have a "record" field (non-structured logs)
            - drop:
                source: record
                expression: "^$"
                drop_counter_reason: "unstructured_log"

            # Parse structured fields from record
            - json:
                expressions:
                  level: record.level.name
                  logger: record.name
                  timestamp: record.time.timestamp
                  http_method: record.extra.http_method
                  http_path: record.extra.http_path
                  http_status_code: record.extra.http_status_code
                  client_ip: record.extra.client_ip
                  environment: record.extra.environment
                  version: record.extra.version
                  trace_id: record.extra.trace_id

            # Add labels for indexing
            - labels:
                level:
                logger:
                http_method:
                client_ip:
                environment:
                version:
                trace_id:
                http_path:
                http_status_code:
