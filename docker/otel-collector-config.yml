receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  otlp:
    endpoint: tempo:4317
    tls:
      insecure: true
    
  prometheus:
    endpoint: "0.0.0.0:9464" # Port for Prometheus scraping
    namespace: "otel" # Optional: Prefix for metric names

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp]
  
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
