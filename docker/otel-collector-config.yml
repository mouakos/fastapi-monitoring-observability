# Receivers define how the collector receives telemetry data (traces and metrics) from the application
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317 # OTLP gRPC for receiving traces and metrics from the app
      http:
        endpoint: 0.0.0.0:4318 # OTLP HTTP (optional, can be used by some libraries that only support HTTP)

# Processors can be used to batch, filter, or transform telemetry data before exporting
processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Copy top-level OTLP log fields into attributes so Loki can promote them to index labels
  transform/logs:
    log_statements:
      - context: log
        statements:
          - set(attributes["level"], severity_text) # severity_text → "level"
          - set(attributes["trace_id"], attributes["extra"]["trace_id"]) # extra.trace_id → "trace_id"
          - set(attributes["request_id"], attributes["extra"]["request_id"]) # extra.request_id → "request_id"
          - set(attributes["version"], attributes["extra"]["version"]) # extra.version → "version" (Loki label)

# Exporters send the processed telemetry data to external systems like Tempo and Prometheus
exporters:
  otlp/tempo:
    endpoint: tempo:4317 # Export traces to Tempo using OTLP gRPC
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:9464" # Port for Prometheus scraping
    namespace: "otel" # Optional: Prefix for metric names
    enable_open_metrics: true # Expose metrics in OpenMetrics format (required for exemplars)

  otlphttp/loki:
    endpoint: http://loki:3100/otlp # Export logs to Loki using OTLP HTTP

  # Prints full OTLP record to collector stdout — temporary, for debugging
  debug:
    verbosity: detailed

# Service defines the pipelines that connect receivers, processors, and exporters
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [transform/logs, batch]
      exporters: [otlphttp/loki, debug]
