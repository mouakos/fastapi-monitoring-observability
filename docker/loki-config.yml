auth_enabled: false

server:
  http_listen_port: 3100 # OTel Collector pushes logs here (OTLP), Grafana queries here

# Common configuration - shared settings across all Loki components
common:
  path_prefix: /loki # Base directory for all Loki data
  storage:
    filesystem:
      chunks_directory: /loki/chunks # Store compressed log chunks
      rules_directory: /loki/rules # Store alerting and recording rules
  replication_factor: 1 # Number of replicas (1 = no replication, single instance)
  ring:
    kvstore:
      store: inmemory # Use in-memory storage for ring coordination (resets on restart)

# Schema configuration - defines how logs are indexed and stored
schema_config:
  configs:
    - from: 2024-01-01 # Schema start date
      store: tsdb # Use TSDB (Time Series Database) for index storage
      object_store: filesystem # Store log chunks on local filesystem
      schema: v13 # Latest schema version (better performance)
      index:
        prefix: index_ # Prefix for index files
        period: 24h # Create new index files every 24 hours

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/index # Directory for active index files
    cache_location: /loki/cache # Cache for index queries (improves query performance)

limits_config:
  retention_period: 168h # Retain logs for 7 days (168 hours)
  volume_enabled: true # Enable volume-based retention (delete old data when volume limit is reached)
  # Promote OTLP attributes to Loki stream labels (indexed, fast filter)
  otlp_config:
    log_attributes:
      - action: index_label
        attributes:
          - level
          - trace_id
          - version

compactor:
  working_directory: /loki/compactor # Directory for compactor to store intermediate files
  compaction_interval: 10m # How often to run compaction
  retention_enabled: true # Must be true for retention_period to take effect
  delete_request_store: filesystem # Where to store pending delete requests
